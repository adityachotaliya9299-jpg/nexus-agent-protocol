[profile.default]
src = "src"
out = "out"
libs = ["lib", "../lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "@account-abstraction/=lib/account-abstraction/",
]
fuzz = { runs = 256 }

[profile.ci]
fuzz = { runs = 1000 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true